<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Metallic Background Circle with Gradients -->
  <defs>
    <radialGradient id="metallic" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#e0e0e0" />
      <stop offset="60%" stop-color="#bdc3c7" />
      <stop offset="100%" stop-color="#7f8c8d" />
    </radialGradient>
    <linearGradient id="iridescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)" />
      <stop offset="50%" stop-color="rgba(200,200,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.5)" />
    </linearGradient>
  </defs>
  
  <!-- Scalloped Edge -->
  <path d="M150 10 L160 15 L170 10 L180 15 L190 10 L200 15 L210 10 L220 15 L230 10 L240 15 L250 10 L255 20 L265 25 L270 35 L280 40 L285 50 L290 60 L285 70 L290 80 L285 90 L290 100 L285 110 L290 120 L285 130 L290 140 L285 150 L290 160 L285 170 L290 180 L285 190 L290 200 L285 210 L290 220 L285 230 L280 240 L270 245 L265 255 L255 260 L250 270 L240 265 L230 275 L220 270 L210 280 L200 275 L190 285 L180 280 L170 290 L160 285 L150 295 L140 285 L130 290 L120 285 L110 280 L100 285 L90 280 L80 285 L70 280 L60 285 L50 280 L45 270 L35 265 L30 255 L20 250 L15 240 L10 230 L15 220 L10 210 L15 200 L10 190 L15 180 L10 170 L15 160 L10 150 L15 140 L10 130 L15 120 L10 110 L15 100 L10 90 L15 80 L10 70 L15 60 L20 50 L30 45 L35 35 L45 30 L50 20 L60 25 L70 20 L80 25 L90 20 L100 25 L110 20 L120 25 L130 20 L140 25 L150 10Z" fill="url(#metallic)" stroke="#bdc3c7" stroke-width="2"/>
  
  <circle cx="150" cy="150" r="120" fill="url(#iridescent)" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="150" cy="150" r="110" fill="none" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Star -->
  <path d="M150 50 L155 65 L170 65 L158 75 L162 90 L150 80 L138 90 L142 75 L130 65 L145 65 Z" fill="#34495e"/>

  <!-- TRUSTED SELLER Text -->
  <text x="50%" y="155" text-anchor="middle" fill="#2c3e50" style="font-family: 'Arial Black', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: -1px;">TRUSTED SELLER</text>

  <!-- Curvied Text - Top -->
  <path id="curve-top" d="M70 120 A 100 100 0 0 1 230 120" fill="none" />
  <text fill="#7f8c8d" style="font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; letter-spacing: 2px;">
    <textPath href="#curve-top" startOffset="50%" text-anchor="middle">EXCELLENT &amp; AUTHENTIC</textPath>
  </text>

  <!-- Curvied Text - Bottom -->
  <path id="curve-bottom" d="M70 180 A 100 100 0 0 0 230 180" fill="none" />
  <text fill="#7f8c8d" style="font-family: Arial, sans-serif; font-size: 16px; font-weight: bold;">
    <textPath href="#curve-bottom" startOffset="50%" text-anchor="middle">100% Quality Guaranteed</textPath>
  </text>

  <!-- Wreath -->
  <path d="M110 210 Q 130 230 150 210 Q 170 230 190 210" stroke="#7f8c8d" stroke-width="2" fill="none"/>
  <path d="M115 215 L120 220 M125 220 L130 225 M170 225 L175 220 M180 220 L185 215" stroke="#7f8c8d" stroke-width="3" stroke-linecap="round"/>
</svg>
